name: Release

# Publishing is driven by tags, so cutting a release is `npm version patch`
# followed by a push. Nothing is built or published from ordinary commits.
on:
  push:
    tags:
      - 'v*'
  # Lets you re-run a release from the Actions tab without moving the tag.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # The e2e suite drives a real Electron window, which needs a desktop
      # session; windows-latest runners provide one.
      - name: End-to-end tests
        run: npm run test:e2e
        env:
          RESONANCE_DISABLE_UPDATER: '1'

      # Built WITHOUT electron-builder's own publishing.
      #
      # Letting it publish created two draft releases for the same tag: the nsis
      # and portable targets each raced to create one, so the assets were split
      # across them. Drafts are also invisible to the public AND to
      # electron-updater, so nothing could be downloaded or auto-updated.
      - name: Build installers
        run: npx electron-builder --win --publish never

      # One explicit, published release with every asset attached. latest.yml is
      # not optional: without it installed copies cannot discover updates.
      - name: Publish release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "release/Resonance-$VERSION-x64.exe" \
            "release/Resonance-$VERSION-portable.exe" \
            "release/latest.yml" \
            --title "Resonance $VERSION" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resonance-windows
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: warn
          retention-days: 14
