<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resonance</title>
    <!--
      CSP admits the two custom schemes up front (plan §A2a):
        resonance-media: for audio, resonance-art: for artwork.
      Omitting these makes audio and art fail *silently* under sandbox.
      'unsafe-inline' for style-src is required by Vite's dev style injection and
      by Framer Motion's inline transforms; no inline scripts are permitted.
      connect-src allows the dev-server websocket for HMR, and both custom
      schemes because fetch() is governed by connect-src rather than img-src or
      media-src — needed for album-art palette sampling and for range-request
      verification.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' resonance-art: data: blob:;
        media-src 'self' resonance-media: blob:;
        font-src 'self' data:;
        connect-src 'self' ws: http://localhost:* resonance-art: resonance-media:;
        object-src 'none';
        base-uri 'none';
        form-action 'none';
      "
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
